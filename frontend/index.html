<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechMart Support</title>
<style>
  :root {
    --ink: #16210f;
    --paper: #f6f4ec;
    --circuit: #2f6b4f;
    --circuit-dim: #cfe3d5;
    --amber: #d98a2b;
    --line: #d8d2bf;
    --white: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'IBM Plex Mono', 'Courier New', monospace;
    background: var(--paper);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 18px 24px;
    border-bottom: 2px solid var(--ink);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    background: var(--paper);
  }
  header .brand {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  header .brand span { color: var(--circuit); }
  header .status {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #6b6455;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--circuit); }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
  }
  .msg { display: flex; flex-direction: column; max-width: 82%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }
  .bubble {
    padding: 12px 15px;
    border-radius: 3px;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
  }
  .msg.user .bubble {
    background: var(--ink);
    color: var(--paper);
    border-radius: 10px 10px 2px 10px;
  }
  .msg.assistant .bubble {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 10px 10px 10px 2px;
  }
  .meta {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #8a8371;
    margin-top: 5px;
    display: flex;
    gap: 6px;
  }
  .tag {
    background: var(--circuit-dim);
    color: var(--circuit);
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 600;
  }
  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: #a9a290;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-4px); opacity: 1; } }

  form {
    border-top: 2px solid var(--ink);
    padding: 16px 24px;
    display: flex;
    justify-content: center;
    background: var(--paper);
  }
  .input-row {
    max-width: 720px;
    width: 100%;
    display: flex;
    gap: 10px;
  }
  input[type=text] {
    flex: 1;
    padding: 12px 14px;
    border: 1.5px solid var(--ink);
    border-radius: 3px;
    font-family: inherit;
    font-size: 14px;
    background: var(--white);
  }
  input[type=text]:focus { outline: 2px solid var(--circuit); outline-offset: 1px; }
  button {
    padding: 12px 20px;
    border: 1.5px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    border-radius: 3px;
    font-family: inherit;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
  }
  button:hover { background: var(--circuit); border-color: var(--circuit); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .suggestions {
    max-width: 720px;
    margin: 0 auto 12px;
    padding: 0 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chip {
    font-size: 12px;
    padding: 6px 12px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: var(--white);
    cursor: pointer;
    color: #5c5645;
  }
  .chip:hover { border-color: var(--circuit); color: var(--circuit); }
</style>
</head>
<body>

<header>
  <div class="brand">Tech<span>Mart</span> Support</div>
  <div class="status"><span class="dot"></span> AI assistant online</div>
</header>

<div id="chat"></div>

<div class="suggestions" id="suggestions">
  <div class="chip" data-q="I paid for Premium yesterday but it's still locked.">Premium not unlocking</div>
  <div class="chip" data-q="What's your return and refund policy?">Refund policy</div>
  <div class="chip" data-q="How long is the warranty on the TechMart Watch S2?">Warranty question</div>
  <div class="chip" data-q="This is the third time my issue hasn't been resolved.">File a complaint</div>
</div>

<form id="chat-form">
  <div class="input-row">
    <input type="text" id="input" placeholder="Describe your issue…" autocomplete="off" />
    <button type="submit" id="send-btn">Send</button>
  </div>
</form>

<script>
  // Point this at your running backend (see backend/main.py). Defaults to localhost.
  const API_BASE = window.TECHMART_API_BASE || "http://localhost:8000";

  const chat = document.getElementById("chat");
  const form = document.getElementById("chat-form");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");
  const suggestions = document.getElementById("suggestions");

  let sessionId = localStorage.getItem("techmart_session_id") || null;

  function addMessage(role, text, meta) {
    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    wrap.appendChild(bubble);
    if (meta) {
      const metaEl = document.createElement("div");
      metaEl.className = "meta";
      metaEl.innerHTML = meta;
      wrap.appendChild(metaEl);
    }
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function addTyping() {
    const wrap = document.createElement("div");
    wrap.className = "msg assistant";
    wrap.id = "typing-indicator";
    wrap.innerHTML = `<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  async function sendMessage(text) {
    if (!text.trim()) return;
    suggestions.style.display = "none";
    addMessage("user", text);
    input.value = "";
    sendBtn.disabled = true;
    addTyping();

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });
      if (!res.ok) throw new Error(`Server responded ${res.status}`);
      const data = await res.json();

      sessionId = data.session_id;
      localStorage.setItem("techmart_session_id", sessionId);

      removeTyping();
      const tags = data.intents.map(i => `<span class="tag">${i}</span>`).join("");
      addMessage("assistant", data.final_answer, `Routed to: ${tags}`);
    } catch (err) {
      removeTyping();
      addMessage("assistant", `Connection error: ${err.message}. Is the backend running at ${API_BASE}?`);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    sendMessage(input.value);
  });

  suggestions.addEventListener("click", (e) => {
    const chip = e.target.closest(".chip");
    if (chip) sendMessage(chip.dataset.q);
  });

  addMessage("assistant", "Hi, I'm the TechMart support assistant. Ask me about billing, orders, technical issues, products, or anything else — I'll route you to the right specialist.");
</script>

</body>
</html>
